name: thebird_flutter
description: TheBird social media app
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Layout
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1

  # Navigation
  go_router: ^14.2.8

  # Backend & Auth
  appwrite: ^12.0.0

  # Media & Camera
  camera: ^0.10.6
  image_picker: ^1.1.2
  video_player: ^2.9.2
  audioplayers: ^6.1.0
  photo_view: ^0.15.0

  # File System & Sharing
  path_provider: ^2.1.2
  share_plus: ^10.1.3

  # Location
  geolocator: ^13.0.2

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Networking & Connectivity
  connectivity_plus: ^6.1.0
  socket_io_client: ^3.0.2
  http: ^1.3.0

  # Maps
  google_maps_flutter: ^2.9.0

  # Country & Picker
  country_code_picker: ^3.0.0

  # Real-time Communication
  agora_rtc_engine: ^6.3.1

  # Animations & Loading
  flutter_skeleton_ui: ^1.0.1
  lottie: ^3.1.2

  # Device Info
  device_info_plus: ^11.0.0
  package_info_plus: ^8.2.1

  # Authentication
  local_auth: ^2.3.0

  # Haptics
  flutter_haptics: ^1.0.2

  # In-App Purchases
  in_app_purchase: ^3.2.0

  # Background Tasks
  flutter_background_service: ^5.0.2

  # Url Launcher
  url_launcher: ^6.3.1

  # Screenshot Detection
  screenshot: ^2.0.1

  # Skeleton Placeholder
  skeletonizer: ^1.4.2

  # Flash List (Performance List)  
  flutter_staggered_grid_view: ^0.7.0

  # Permissions
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
