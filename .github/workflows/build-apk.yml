name: Build Flutter APK
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
      - run: flutter pub get
      - name: Regenerate Android folder
        run: flutter create --platforms=android .
      - name: Rename app to TheBird
        run: sed -i 's/android:label=".*"/android:label="TheBird"/g' android/app/src/main/AndroidManifest.xml
      - name: Fix NDK version for plugins
        run: |
          sed -i '/android {/a \ \ \ \ ndkVersion = "27.0.12077973"' android/app/build.gradle.kts
      - name: Build with verbose output
        run: flutter build apk --release --verbose
      - uses: actions/upload-artifact@v4
        with:
          name: TheBird-APK
          path: build/app/outputs/flutter-apk/app-release.apk
